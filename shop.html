<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aloy Electric & Electronics</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;

background: radial-gradient(circle at top,#3a2a00,#080500);

color:white;
text-align:center;
}

/* CONTAINER */

.container{
padding:20px 12px;
}

/* LOGO */

.logo{
width:130px;
height:130px;

border-radius:50%;
object-fit:cover;

border:3px solid #ffd700;

box-shadow:
0 0 25px #ffd700,
0 0 50px #ffcc00,
inset 0 0 15px #ffd700;

margin-bottom:18px;

display:block;
margin-left:auto;
margin-right:auto;
}

/* NAME */

.name{
font-family:'Cinzel',serif;
font-size:20px;

color:#ffe27a;

text-shadow:
0 0 10px #ffd700,
0 0 20px #ffcc00;

letter-spacing:2px;
margin-bottom:5px;
}

.sdn{
display:block;
text-align:center;
font-size:20px;
}  

/* COMPANY */

.company{
font-family:'Cinzel',serif;
font-size:20px;
color:#ffe27a;

text-shadow:
0 0 10px #ffd700,
0 0 20px #ffcc00;

letter-spacing:2px;
text-align:center;

margin-top:-5px;
margin-bottom:18px;
}

/* BUTTON STYLE */

.link-btn{

display:flex;
align-items:center;
justify-content:center;
gap:10px;

width:90%;
max-width:320px;

margin:10px auto;
padding:11px;

border-radius:40px;

text-decoration:none;
color:#fff5d0;

font-size:14px;
font-weight:500;

background:rgba(30,20,0,0.55);

border:1px solid #ffd700;

backdrop-filter:blur(6px);

box-shadow:
0 0 12px rgba(255,215,0,0.8),
inset 0 0 8px rgba(255,215,0,0.4);

transition:0.3s;
}

/* ICON */

.link-btn i{
font-size:16px;
color:#ffd700;
}

/* HOVER */

.link-btn:hover{

transform:scale(1.05);

background:#ffd700;
color:black;

box-shadow:
0 0 22px #ffd700,
0 0 40px #ffcc00,
inset 0 0 14px #ffd700;

}

/* FOOTER */

.footer{
margin-top:18px;
font-size:11px;
color:#d4b75a;
}

</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo" alt="Company Logo">

<div class="name">ALOY ELECTRIC & ELECTRONICS</div>
<div class="company">SDN BHD</div>

<a href="tel:+60126768454" class="link-btn">
<i class="fa-solid fa-phone"></i> Call Mobile
</a>

<a href="tel:+60361881028" class="link-btn">
<i class="fa-solid fa-phone"></i> Call Office
</a>

<a href="https://wa.me/60126768454" class="link-btn">
<i class="fa-brands fa-whatsapp"></i> WhatsApp
</a>

<a href="mailto:aloyelec@gmail.com" class="link-btn">
<i class="fa-solid fa-envelope"></i> Email
</a>

<a href="https://www.facebook.com/share/1GA3abi5b5/?mibextid=wwXIfr" class="link-btn" target="_blank">
<i class="fa-brands fa-facebook"></i> Facebook
</a>

<a href="https://www.tiktok.com/@aloy1180" class="link-btn" target="_blank">
<i class="fa-brands fa-tiktok"></i> TikTok
</a>

<a href="https://maps.app.goo.gl/J3CjHgwfwbBiRa4x5?g_st=aw" class="link-btn" target="_blank">

<a href="shop_contact.vcf" class="link-btn">

<div class="footer">
© 2026 Aloy Electric & Electronics
</div>

</div>

</body>

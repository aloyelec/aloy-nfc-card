<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background: radial-gradient(circle at top,#3b0030,#120012);
color:white;
text-align:center;
}

.container{
padding:18px 12px;
}

/* LOGO */

.logo{
width:95px;
height:95px;
border-radius:50%;
object-fit:cover;
border:3px solid #ff4da6;
box-shadow:
0 0 22px #ff4da6,
0 0 35px #ff4da6,
inset 0 0 12px #ff4da6;
margin-bottom:15px;
}

/* PROFILE */

.profile{
width:130px;
height:130px;
object-fit:cover;
border-radius:14px;
border:3px solid #ff4da6;
box-shadow:
0 0 22px #ff4da6,
0 0 35px #ff4da6,
inset 0 0 10px #ff4da6;
margin-bottom:18px;
}

/* NAME */

.name{
font-family:'Cinzel',serif;
font-size:18px;
font-weight:700;
color:#ff7bc2;
text-shadow:0 0 10px #ff4da6;
margin-bottom:4px;
letter-spacing:1px;
}

/* COMPANY */

.company{
font-size:13px;
color:#ffd6ea;
margin-bottom:14px;
text-transform:uppercase;
letter-spacing:1px;
}

/* BUTTONS */

.link-btn{
display:flex;
align-items:center;
justify-content:center;
gap:8px;

width:85%;
max-width:300px;

margin:9px auto;
padding:9px 12px;

background:rgba(30,0,25,0.55);

border-radius:40px;

text-decoration:none;
color:white;

font-weight:500;
font-size:13px;

border:1px solid #ff4da6;

box-shadow:
0 0 10px rgba(255,77,166,0.9),
inset 0 0 8px rgba(255,77,166,0.4);

transition:0.3s;
}

/* ICON */

.link-btn i{
font-size:15px;
color:#ff7bc2;
}

/* HOVER */

.link-btn:hover{
background:#ff4da6;
color:black;
transform:scale(1.04);

box-shadow:
0 0 22px #ff4da6,
0 0 35px #ff4da6,
inset 0 0 12px #ff4da6;
}

/* FOOTER */

.footer{
margin-top:20px;
font-size:10px;
color:#f0a8cc;
}

</style>
</head>

<div class="container">

<style>

body{

background:linear-gradient(145deg,#000000,#0a0f1f);
color:white;

.container{
padding:25px 15px;

/* LOGO */
.logo{
width:110px;
height:110px;

object-fit:cover;
border:3px solid gold;

display:flex;

max-width:320px;

padding:10px 12px;
background:#0f1629;
border-radius:10px;
text-decoration:none;
color:white;
font-weight:500;
font-size:14px;
border:1px solid gold;
transition:0.3s;
}

.link-btn i{
font-size:16px;
color:gold;
}

.link-btn:hover{
background:gold;
color:black;
transform:scale(1.03);
box-shadow:0 0 10px rgba(255,215,0,0.8);

.footer{
margin-top:30px;

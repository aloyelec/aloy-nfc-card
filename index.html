<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(145deg,#000000,#0a0f1f);
color:white;
text-align:center;
}

/* CONTAINER */
.container{
padding:20px 14px;
max-width:420px;
margin:auto;
}

/* LOGO */
.logo{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
border:2px solid #00aaff;
box-shadow:0 0 15px rgba(0,170,255,0.6);
margin-bottom:15px;
}

/* PROFILE */
.profile{
width:130px;
height:130px;
object-fit:cover;
border-radius:12px;
border:2px solid #00aaff;
box-shadow:0 0 15px rgba(0,170,255,0.5);
margin-bottom:18px;
}

/* NAME (GLOWING BLUE) */
.name{
font-family:'Cinzel',serif;
font-size:22px;
font-weight:700;
color:#00aaff;
letter-spacing:1px;
margin-bottom:5px;

text-shadow:
0 0 5px #00aaff,
0 0 10px #00aaff,
0 0 18px #007bff;
}

/* COMPANY */
.company{
font-size:13px;
letter-spacing:2px;
text-transform:uppercase;
opacity:0.85;
margin-bottom:18px;
}

/* BUTTONS */
.link-btn{
display:flex;
align-items:center;
justify-content:center;
gap:8px;

width:90%;
max-width:300px;

margin:8px auto;
padding:10px 12px;

background:#0f1629;

border-radius:10px;
text-decoration:none;
color:white;

font-weight:500;
font-size:14px;

border:1px solid #007bff;

box-shadow:0 0 8px rgba(0,123,255,0.4);

transition:0.25s;
}

/* ICON */
.link-btn i{
font-size:16px;
color:#00aaff;
}

/* HOVER */
.link-btn:hover{
background:#007bff;
transform:scale(1.03);
box-shadow:0 0 15px rgba(0,123,255,0.8);
}

/* FOOTER */
.footer{
margin-top:25px;
font-size:11px;
color:#777;
}  

</style>
</head>

<div class="container">

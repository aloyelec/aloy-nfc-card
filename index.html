<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aloy Electric & Electronics</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(145deg,#000000,#0a0f1f);
color:white;
text-align:center;
}

.container{
padding:25px 15px;
}

/* LOGO */
.logo{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
border:3px solid #007bff;
box-shadow:0 0 20px rgba(0,123,255,0.8);
margin-bottom:20px;
display:block;
margin-left:auto;
margin-right:auto;
}

/* PROFILE */
.profile{
width:150px;
height:150px;
object-fit:cover;
border-radius:12px;
border:2px solid #007bff;
box-shadow:0 0 15px rgba(0,123,255,0.7);
margin-bottom:25px;
display:block;
margin-left:auto;
margin-right:auto;
}

/* NAME (GLOWING BLUE) */
.name{
font-family:'Cinzel',serif;
font-size:22px;
font-weight:700;
color:#00aaff;
letter-spacing:1px;
margin-bottom:6px;

text-shadow:
0 0 8px rgba(0,170,255,0.9),
0 0 18px rgba(0,170,255,0.7),
0 0 28px rgba(0,170,255,0.5);
}

/* COMPANY (EXECUTIVE STYLE) */
.company{
font-size:14px;
color:#ffffff;
text-transform:uppercase;
letter-spacing:2px;
opacity:0.85;
margin-bottom:22px;
}

/* LUXURY BUTTONS */
.link-btn{
display:flex;
align-items:center;
justify-content:center;
gap:8px;
width:85%;
max-width:320px;
margin:10px auto;
padding:11px 14px;

background:rgba(15,22,41,0.95);

border-radius:14px;
text-decoration:none;
color:white;

font-weight:500;
font-size:14px;

border:1px solid #007bff;

box-shadow:
0 0 8px rgba(0,123,255,0.4),
inset 0 0 6px rgba(0,123,255,0.2);

transition:all 0.25s ease;
}

/* ICONS */
.link-btn i{
font-size:16px;
color:#00aaff;
}

/* BUTTON HOVER */
.link-btn:hover{
background:#007bff;
transform:scale(1.05);

box-shadow:
0 0 18px rgba(0,123,255,0.9),
0 0 30px rgba(0,123,255,0.6);
}

/* FOOTER */
.footer{
margin-top:30px;
font-size:11px;
color:#888;
}

</style>
</head>

<body>

<div class="container">

<img src="logo.png" alt="Company Logo" class="logo">

<img src="profile.jpg" alt="Profile Photo" class="profile">

<div class="name">ALOYSIOUS @ ALOY</div>

<div class="company">ALOY ELECTRIC & ELECTRONICS SDN BHD</div>

<a href="tel:0192408454" class="link-btn">
<i class="fa-solid fa-phone"></i> Call Now
</a>

<a href="https://wa.me/60192408454" class="link-btn">
<i class="fa-brands fa-whatsapp"></i> WhatsApp
</a>

<a href="mailto:aloyelec@gmail.com" class="link-btn">
<i class="fa-solid fa-envelope"></i> Email
</a>

<a href="https://www.facebook.com/share/1GA3abi5b5/?mibextid=wwXIfr" class="link-btn" target="_blank">
<i class="fa-brands fa-facebook"></i> Facebook
</a>

<a href="https://www.tiktok.com/@aloy1180" class="link-btn" target="_blank">
<i class="fa-brands fa-tiktok"></i> TikTok
</a>

<a href="https://maps.app.goo.gl/J3CjHgwfwbBiRa4x5?g_st=aw" class="link-btn" target="_blank">

<a href="aloy_contact.vcf" class="link-btn">

<div class="footer">
© 2026 Aloy Electric & Electronics
</div>

</div>

</body>
</html>

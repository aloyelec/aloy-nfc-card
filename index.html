<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aloy Electric & Electronics</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(160deg,#000000,#050b1a,#0a1633);
color:white;
text-align:center;
}

/* CONTAINER */
.container{
padding:35px 18px;
}

/* LOGO */
.logo{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
border:3px solid #00aaff;

box-shadow:
0 0 10px rgba(0,170,255,0.6),
0 0 25px rgba(0,170,255,0.6);

margin-bottom:20px;
display:block;
margin-left:auto;
margin-right:auto;
}

/* PROFILE */
.profile{
width:160px;
height:160px;
object-fit:cover;
border-radius:14px;

border:2px solid #00aaff;

box-shadow:
0 0 15px rgba(0,170,255,0.7),
0 0 35px rgba(0,170,255,0.4);

margin-bottom:28px;

display:block;
margin-left:auto;
margin-right:auto;
}

/* NAME */
.name{
font-family:'Cinzel',serif;
font-size:26px;
font-weight:700;
color:#00aaff;

letter-spacing:2px;
margin-bottom:8px;

text-shadow:
0 0 6px #00aaff,
0 0 12px #00aaff,
0 0 25px #00aaff,
0 0 45px #007bff;
}

/* COMPANY LINE */
.company{
font-size:14px;
letter-spacing:3px;
text-transform:uppercase;
opacity:0.85;
margin-bottom:30px;
}

/* LUXURY BUTTONS */
.link-btn{
display:flex;
align-items:center;
justify-content:center;
gap:10px;

width:88%;
max-width:340px;

margin:12px auto;
padding:14px;

background:rgba(15,22,41,0.85);

border-radius:16px;

text-decoration:none;
color:white;

font-weight:500;
font-size:15px;

border:1px solid rgba(0,170,255,0.6);

backdrop-filter: blur(6px);

box-shadow:
0 0 10px rgba(0,170,255,0.4),
inset 0 0 10px rgba(0,170,255,0.2);

transition:all 0.3s ease;
}

/* ICONS */
.link-btn i{
font-size:18px;
color:#00aaff;
}

/* BUTTON HOVER */
.link-btn:hover{

background:rgba(0,123,255,0.95);

transform:scale(1.06);

box-shadow:
0 0 20px rgba(0,170,255,0.9),
0 0 35px rgba(0,170,255,0.6);

}

/* FOOTER */
.footer{
margin-top:40px;
font-size:11px;
color:#777;
}

</style>
</head>

<body>

<div class="container">

<img src="logo.png" alt="Company Logo" class="logo">

<img src="profile.jpg" alt="Profile Photo" class="profile">

<div class="name">ALOYSIOUS @ ALOY</div>

<div class="company">ALOY ELECTRIC & ELECTRONICS SDN BHD</div>

<a href="tel:0192408454" class="link-btn">
<i class="fa-solid fa-phone"></i> Call Now
</a>

<a href="https://wa.me/60192408454" class="link-btn">
<i class="fa-brands fa-whatsapp"></i> WhatsApp
</a>

<a href="mailto:aloyelec@gmail.com" class="link-btn">
<i class="fa-solid fa-envelope"></i> Email
</a>

<a href="https://www.facebook.com/share/1GA3abi5b5/?mibextid=wwXIfr" class="link-btn" target="_blank">
<i class="fa-brands fa-facebook"></i> Facebook
</a>

<a href="https://www.tiktok.com/@aloy1180" class="link-btn" target="_blank">
<i class="fa-brands fa-tiktok"></i> TikTok
</a>

<a href="https://maps.app.goo.gl/J3CjHgwfwbBiRa4x5?g_st=aw" class="link-btn" target="_blank">
<i class="fa-solid fa-location-dot"></i> Location
</a>

<a href="aloy_contact.vcf" class="link-btn">
<i class="fa-solid fa-address-card"></i> Save Contact
</a>

<div class="footer">
© 2026 Aloy Electric & Electronics
</div>

</div>

</body>
</html>

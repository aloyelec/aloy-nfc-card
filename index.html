<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background: radial-gradient(circle at top,#0b1f44,#000814);
color:white;
text-align:center;
}

/* CONTAINER */

.container{
padding:18px 12px;
}

/* LOGO */

.logo{
width:95px;
height:95px;
border-radius:50%;
object-fit:cover;
border:3px solid #2ecbff;

box-shadow:
0 0 22px #00c8ff,
inset 0 0 12px #00c8ff;

margin-bottom:12px;

/* ADD THIS */
display:block;
margin-left:auto;
margin-right:auto;
}

/* PROFILE */

.profile{
width:135px;
height:135px;
object-fit:cover;
border-radius:16px;
border:3px solid #2ecbff;

box-shadow:
0 0 22px #00c8ff,
inset 0 0 10px #00c8ff;

margin-bottom:12px;

/* ADD THIS */
display:block;
margin-left:auto;
margin-right:auto;
}

/* NAME */

.name{
font-family:'Cinzel',serif;
font-size:19px;
color:#8fd3ff;
text-shadow:0 0 10px #00bfff;
letter-spacing:2px;
margin-bottom:3px;
}

/* COMPANY */

.company{
font-size:13px;
letter-spacing:1px;
color:#d6ecff;
margin-bottom:16px;
}

/* BUTTON STYLE */

.link-btn{
display:flex;
align-items:center;
justify-content:center;
gap:8px;

width:90%;
max-width:310px;

margin:9px auto;
padding:10px;

border-radius:40px;

text-decoration:none;
color:white;

font-size:14px;
font-weight:500;

background:rgba(5,15,35,0.6);

border:1px solid #2ecbff;

box-shadow:
0 0 8px rgba(0,170,255,0.7),
inset 0 0 8px rgba(0,170,255,0.4);

transition:0.3s;
}

/* ICON */

.link-btn i{
font-size:16px;
color:#00d4ff;
}

/* HOVER */

.link-btn:hover{
transform:scale(1.04);
background:#007bff;

box-shadow:
0 0 18px #00c8ff,
inset 0 0 18px #00c8ff;
}

/* FOOTER */

.footer{
margin-top:18px;
font-size:11px;
color:#9fb7d9;
}

</style>
</head>
